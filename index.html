<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Unidad 5 – Velocidad y Conducción Segura</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a1a;
    --surface: #0d1730;
    --card: #0f1e38;
    --accent: #38bdf8;
    --accent2: #f97316;
    --green: #4ade80;
    --red: #f87171;
    --text: #e0f2fe;
    --muted: #7dd3fc;
    --radius: 18px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Mulish',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.12) 0%, transparent 60%);
  }

  .header { width:100%; max-width:700px; text-align:center; margin-bottom:28px; }
  .unit-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.3); color:var(--accent); font-weight:700; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; padding:5px 16px; border-radius:30px; margin-bottom:12px; }
  .header h1 { font-family:'Exo 2',sans-serif; font-size:2.3rem; color:#fff; font-weight:900; }
  .header p { color:var(--muted); font-size:0.9rem; margin-top:5px; }
  .speedometer { display:flex; justify-content:center; align-items:center; gap:6px; margin-top:16px; }
  .speed-pip { width:12px; height:12px; border-radius:50%; background:rgba(56,189,248,0.15); transition:all 0.3s; }
  .speed-pip.active { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .speed-pip.done { background:rgba(74,222,128,0.5); }

  .quiz-card { background:var(--card); border-radius:var(--radius); padding:32px; width:100%; max-width:700px; border:1px solid rgba(56,189,248,0.1); box-shadow:0 8px 50px rgba(0,0,0,0.6); animation:slideIn 0.35s ease; }
  @keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .q-counter { font-size:0.78rem; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .q-type-badge { display:inline-block; font-size:0.72rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 12px; border-radius:20px; margin-bottom:14px; background:rgba(56,189,248,0.08); color:var(--accent); border:1px solid rgba(56,189,248,0.2); }
  .q-text { font-family:'Exo 2',sans-serif; font-size:1.15rem; font-weight:800; line-height:1.4; margin-bottom:24px; color:#fff; }

  /* SPEED COMPARE */
  .speed-compare { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  .speed-box { background:var(--surface); border:1.5px solid rgba(56,189,248,0.12); border-radius:14px; padding:18px; text-align:center; }
  .speed-val { font-family:'Exo 2',sans-serif; font-size:2.2rem; font-weight:900; color:var(--accent); }
  .speed-unit { font-size:0.75rem; color:var(--muted); font-weight:600; margin-top:2px; }
  .speed-label { font-size:0.8rem; color:var(--muted); margin-top:6px; }
  .speed-arrow { display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--accent2); }

  /* SLIDER QUIZ */
  .slider-area { margin-bottom:20px; }
  .slider-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem; color:var(--muted); font-weight:600; }
  .quiz-slider { width:100%; -webkit-appearance:none; height:8px; border-radius:4px; background:rgba(56,189,248,0.15); outline:none; }
  .quiz-slider::-webkit-slider-thumb { -webkit-appearance:none; width:24px; height:24px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 10px rgba(56,189,248,0.4); }
  .slider-display { text-align:center; margin-top:12px; }
  .slider-val { font-family:'Exo 2',sans-serif; font-size:2.5rem; font-weight:900; color:var(--accent); }
  .slider-unit-label { font-size:0.85rem; color:var(--muted); }
  .btn-check-slider { margin-top:14px; width:100%; padding:13px; background:rgba(56,189,248,0.12); border:1.5px solid var(--accent); color:var(--accent); font-family:'Mulish',sans-serif; font-size:0.95rem; font-weight:700; border-radius:11px; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; transition:all 0.2s; }
  .btn-check-slider:hover { background:rgba(56,189,248,0.2); }

  /* OPTIONS */
  .options { display:flex; flex-direction:column; gap:10px; }
  .option { background:var(--surface); border:1.5px solid rgba(56,189,248,0.1); border-radius:12px; padding:14px 18px; cursor:pointer; font-size:0.96rem; font-weight:600; color:var(--text); transition:all 0.2s; display:flex; align-items:center; gap:12px; }
  .option:hover:not(.disabled) { border-color:var(--accent); background:rgba(56,189,248,0.06); transform:translateX(5px); }
  .option.correct { border-color:var(--green); background:rgba(74,222,128,0.08); color:var(--green); }
  .option.wrong { border-color:var(--red); background:rgba(248,113,113,0.08); color:var(--red); }
  .option.disabled { cursor:default; }
  .opt-dot { width:28px; height:28px; border-radius:7px; background:rgba(56,189,248,0.1); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; color:var(--accent); flex-shrink:0; }

  /* TF */
  .tf-options { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .tf-btn { background:var(--surface); border:2px solid rgba(56,189,248,0.1); border-radius:16px; padding:28px 16px; cursor:pointer; font-family:'Exo 2',sans-serif; font-size:1.1rem; font-weight:800; text-align:center; transition:all 0.25s; }
  .tf-btn .tf-icon { font-size:2.8rem; display:block; margin-bottom:8px; }
  .tf-btn.true-btn:hover:not(.disabled) { border-color:var(--green); background:rgba(74,222,128,0.07); color:var(--green); }
  .tf-btn.false-btn:hover:not(.disabled) { border-color:var(--red); background:rgba(248,113,113,0.07); color:var(--red); }
  .tf-btn.correct { border-color:var(--green); background:rgba(74,222,128,0.1); color:var(--green); }
  .tf-btn.wrong { border-color:var(--red); background:rgba(248,113,113,0.1); color:var(--red); }

  /* IMAGE */
  .img-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .img-tile2 { background:var(--surface); border:2px solid rgba(56,189,248,0.1); border-radius:14px; padding:20px 14px; cursor:pointer; text-align:center; transition:all 0.25s; }
  .img-tile2:hover:not(.disabled) { border-color:var(--accent); transform:scale(1.03); }
  .img-tile2.correct { border-color:var(--green); background:rgba(74,222,128,0.08); }
  .img-tile2.wrong { border-color:var(--red); background:rgba(248,113,113,0.08); }
  .img-tile2 .te { font-size:2.6rem; display:block; margin-bottom:8px; }
  .img-tile2 .tl { font-size:0.88rem; font-weight:700; }

  .feedback { margin-top:18px; padding:14px 18px; border-radius:12px; font-size:0.92rem; font-weight:600; line-height:1.5; display:none; }
  .feedback.show { display:block; animation:fadeIn 0.3s; }
  .feedback.correct { background:rgba(74,222,128,0.07); border:1px solid rgba(74,222,128,0.3); color:var(--green); }
  .feedback.wrong { background:rgba(248,113,113,0.07); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .btn-next { margin-top:20px; width:100%; padding:15px; background:var(--accent); color:#050a1a; font-family:'Mulish',sans-serif; font-size:1rem; font-weight:800; border:none; border-radius:12px; cursor:pointer; letter-spacing:0.5px; text-transform:uppercase; display:none; transition:all 0.2s; }
  .btn-next:hover { background:#7dd3fc; transform:translateY(-2px); }
  .btn-next.show { display:block; }

  .results { text-align:center; width:100%; max-width:700px; }
  .results-card { background:var(--card); border-radius:var(--radius); padding:42px 32px; border:1px solid rgba(56,189,248,0.12); box-shadow:0 8px 50px rgba(0,0,0,0.6); }
  .gauge-wrap { display:flex; justify-content:center; margin-bottom:20px; }
  .score-big2 { font-family:'Exo 2',sans-serif; font-size:5rem; font-weight:900; color:var(--accent); line-height:1; }
  .score-sub2 { font-size:0.9rem; color:var(--muted); margin-bottom:16px; }
  .res-title { font-family:'Exo 2',sans-serif; font-size:2rem; font-weight:900; color:#fff; margin-bottom:8px; }
  .res-msg { color:var(--muted); font-size:0.97rem; margin-bottom:28px; line-height:1.6; }
  .btn-restart { background:var(--accent); color:#050a1a; border:none; padding:14px 36px; border-radius:12px; font-family:'Mulish',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
  .btn-restart:hover { background:#7dd3fc; transform:translateY(-2px); }
  .hidden { display:none; }
  .info-box { background:rgba(249,115,22,0.08); border:1px solid rgba(249,115,22,0.2); border-radius:12px; padding:14px 18px; margin-bottom:20px; font-size:0.9rem; color:#fdba74; line-height:1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="unit-badge">⚡ Unidad 5</div>
  <h1>Velocidad y Conducción Segura</h1>
  <p>Física aplicada · Límites legales · Manejo defensivo</p>
  <div class="speedometer" id="pipRow">
    <div class="speed-pip active" id="pip0"></div>
    <div class="speed-pip" id="pip1"></div>
    <div class="speed-pip" id="pip2"></div>
    <div class="speed-pip" id="pip3"></div>
    <div class="speed-pip" id="pip4"></div>
  </div>
</div>

<div class="quiz-card" id="quizCard"></div>
<div class="results hidden" id="resultsScreen"></div>

<script>
const questions = [
  {
    type: 'multiple',
    counter: 'Pregunta 1 de 5',
    badge: '📐 Física del frenado',
    infobox: '⚠️ A 90 km/h, un tracto-camión cargado puede necesitar el DOBLE de distancia de frenado de un automóvil.',
    question: '¿Cuáles son las DOS fases de la distancia total de frenado de un vehículo pesado?',
    options: [
      'Fase de aceleración y fase de desaceleración del motor',
      'Distancia de reacción (del conductor) y distancia de frenado (de los frenos)',
      'Distancia de aviso (señal) y distancia de parada (señal PARE)',
      'Fase de percepción visual y fase de evasión del obstáculo'
    ],
    correct: 1,
    feedback: '✅ ¡Correcto! La distancia de REACCIÓN es el tiempo hasta que el conductor pisa el freno (~22m a 80km/h). La distancia de FRENADO es desde que actúan los frenos hasta detenerse. Juntas forman la distancia total.'
  },
  {
    type: 'image',
    counter: 'Pregunta 2 de 5',
    badge: '🖼️ Límites de velocidad',
    question: '¿Cuál es la velocidad máxima permitida para un vehículo pesado Tipo E en una CARRETERA RURAL de dos carriles?',
    options: [
      { emoji: '🚗', label: '90 km/h — igual que un automóvil' },
      { emoji: '🚛', label: '70 km/h — límite para vehículo pesado' },
      { emoji: '⚡', label: '80 km/h — límite estándar' },
      { emoji: '🏙️', label: '50 km/h — como en zona urbana' }
    ],
    correct: 1,
    feedback: '✅ ¡Correcto! En carretera rural de 2 carriles, el automóvil puede ir a 90 km/h, pero el vehículo pesado Tipo E tiene un límite de 70 km/h. Los vehículos pesados tienen límites más restrictivos por su mayor distancia de frenado.'
  },
  {
    type: 'truefalse',
    counter: 'Pregunta 3 de 5',
    badge: '✅ Verdadero o Falso',
    question: 'En pavimento húmedo, la distancia de frenado de un vehículo aumenta hasta un 40%. Por eso, si el límite es 70 km/h y llueve fuerte, reducir la velocidad es OBLIGATORIO aunque no haya señal específica.',
    correct: true,
    feedback: '✅ VERDADERO. La lluvia reduce la adherencia de los neumáticos y puede aumentar la distancia de frenado un 40%. Adaptar la velocidad a las condiciones es obligación del conductor, independientemente del límite máximo.'
  },
  {
    type: 'multiple',
    counter: 'Pregunta 4 de 5',
    badge: '🛡️ Manejo defensivo',
    question: '¿Cuántos segundos de distancia mínima debe mantener un conductor Tipo E con el vehículo de adelante cuando va CARGADO en condiciones normales?',
    options: [
      'Mínimo 2 segundos (igual que cualquier vehículo liviano)',
      'Mínimo 3 segundos; en lluvia al menos 5 segundos',
      'Mínimo 4 segundos; en lluvia al menos 8 segundos',
      'Mínimo 6 segundos siempre, independientemente de las condiciones'
    ],
    correct: 2,
    feedback: '✅ ¡Correcto! Con vehículo CARGADO se requieren mínimo 4 segundos de distancia. En lluvia, al menos 8 segundos. Esta "regla del tiempo" es más práctica que medir metros, pues se adapta automáticamente a la velocidad.'
  },
  {
    type: 'truefalse',
    counter: 'Pregunta 5 de 5',
    badge: '✅ Verdadero o Falso',
    question: 'Si un conductor va a la velocidad máxima legal permitida, significa automáticamente que va a una velocidad SEGURA y adecuada para las condiciones del momento.',
    correct: false,
    feedback: '❌ FALSO. La velocidad correcta es "moderada": adaptada al tráfico, clima, vía y estado del conductor. Se puede ir a la velocidad legal pero en condiciones de lluvia, niebla o fatiga, esa velocidad puede ser EXCESIVA y peligrosa.'
  }
];

let current = 0, score = 0, answered = false;

function updatePips() {
  for (let i = 0; i < 5; i++) {
    const p = document.getElementById(`pip${i}`);
    if (i < current) p.className = 'speed-pip done';
    else if (i === current) p.className = 'speed-pip active';
    else p.className = 'speed-pip';
  }
}

function render() {
  const q = questions[current];
  answered = false;
  updatePips();
  const card = document.getElementById('quizCard');
  let html = `<div class="q-counter">${q.counter}</div><div class="q-type-badge">${q.badge}</div>`;
  if (q.infobox) html += `<div class="info-box">${q.infobox}</div>`;
  html += `<div class="q-text">${q.question}</div>`;

  if (q.type === 'multiple') {
    const lets = ['A','B','C','D'];
    html += `<div class="options">`;
    q.options.forEach((o, i) => html += `<div class="option" onclick="checkAns(${i})" id="opt${i}"><div class="opt-dot">${lets[i]}</div>${o}</div>`);
    html += `</div>`;
  } else if (q.type === 'truefalse') {
    html += `<div class="tf-options">
      <div class="tf-btn true-btn" onclick="checkTF(true)" id="tfTrue"><span class="tf-icon">✅</span>VERDADERO</div>
      <div class="tf-btn false-btn" onclick="checkTF(false)" id="tfFalse"><span class="tf-icon">❌</span>FALSO</div>
    </div>`;
  } else if (q.type === 'image') {
    html += `<div class="img-grid2">`;
    q.options.forEach((o, i) => html += `<div class="img-tile2" onclick="checkAns(${i})" id="opt${i}"><span class="te">${o.emoji}</span><div class="tl">${o.label}</div></div>`);
    html += `</div>`;
  }

  html += `<div class="feedback" id="feedbackBox"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">${current < questions.length - 1 ? '→ SIGUIENTE' : '🏁 VER RESULTADOS'}</button>`;
  card.innerHTML = html;
}

function checkAns(sel) {
  if (answered) return; answered = true;
  const q = questions[current];
  const ok = sel === q.correct;
  if (ok) score++;
  document.querySelectorAll('.option,.img-tile2').forEach(e => e.classList.add('disabled'));
  document.getElementById(`opt${sel}`).classList.add(ok ? 'correct' : 'wrong');
  if (!ok) document.getElementById(`opt${q.correct}`).classList.add('correct');
  showFB(ok, q.feedback);
}

function checkTF(val) {
  if (answered) return; answered = true;
  const q = questions[current];
  const ok = val === q.correct;
  if (ok) score++;
  ['tfTrue','tfFalse'].forEach(id => document.getElementById(id).classList.add('disabled'));
  document.getElementById(val ? 'tfTrue' : 'tfFalse').classList.add(ok ? 'correct' : 'wrong');
  if (!ok) document.getElementById(q.correct ? 'tfTrue' : 'tfFalse').classList.add('correct');
  showFB(ok, q.feedback);
}

function showFB(ok, text) {
  const fb = document.getElementById('feedbackBox');
  fb.className = `feedback show ${ok ? 'correct' : 'wrong'}`;
  fb.innerHTML = text;
  document.getElementById('btnNext').classList.add('show');
}

function nextQ() {
  current++;
  if (current >= questions.length) showResults();
  else render();
}

function showResults() {
  for (let i = 0; i < 5; i++) document.getElementById(`pip${i}`).className = 'speed-pip done';
  document.getElementById('quizCard').classList.add('hidden');
  const pct = Math.round((score / questions.length) * 100);
  const msg = pct === 100 ? '🏆 ¡Perfecto! Dominas la física del frenado y el manejo defensivo.' :
              pct >= 80 ? '🎯 ¡Muy bien! Sólido conocimiento de velocidad y seguridad.' :
              pct >= 60 ? '📚 Bien. Repasa los límites de velocidad y distancias de seguridad.' :
              '🔄 Revisa la Unidad 5. La distancia de frenado y los límites para Tipo E son clave.';
  document.getElementById('resultsScreen').classList.remove('hidden');
  document.getElementById('resultsScreen').innerHTML = `
    <div class="results-card">
      <div class="score-big2">${score}<span style="font-size:2rem;color:var(--muted)">/${questions.length}</span></div>
      <div class="score-sub2">${pct}% de respuestas correctas</div>
      <div class="res-title">Resultado Final</div>
      <div class="res-msg">${msg}</div>
      <button class="btn-restart" onclick="restart()">↺ Intentar de nuevo</button>
    </div>`;
}
function restart() {
  current = 0; score = 0;
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  render();
}
render();
</script>
</body>
</html>
